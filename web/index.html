<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AFTERHOURS TV Display">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AFTERHOURS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AFTERHOURS</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #070712;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      transition: opacity 0.6s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    #splash h1 {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #FF007A, #ffffff 40%, #ffffff 60%, #FF007A);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .spinner {
      margin-top: 32px;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top: 3px solid #FF007A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #splash .sub {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div id="splash">
    <h1>AFTERHOURS</h1>
    <div class="spinner"></div>
    <div class="sub">Loading&hellip;</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('splash').classList.add('hide');
    });
    setTimeout(() => {
      const el = document.getElementById('splash');
      if (el) el.classList.add('hide');
    }, 10000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
